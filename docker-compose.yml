version: "3.9"

services:

  mysql:
    image: mysql:8
    container_name: telecom_mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: telecom_db

    ports:
      - "3310:3306"

    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  telecom-pipeline:
    build: .
    container_name: telecom_pipeline

    depends_on:
      - mysql
      - prefect-server

    volumes:
      - .:/app

  prefect-server:
    image: prefecthq/prefect:2-latest
    container_name: prefect_server

    command: prefect server start --analytics off

    ports:
      - "4200:4200"

    environment:
      PREFECT_API_URL: http://prefect-server:4200/api